<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Finder</title>
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body class="dark">
    <!-- NavBar -->
    <nav>
      <!-- logo -->
      <ul>
        <li class="logo">
          <img src="./assets/logo.png" alt="Logo" />
          <h2>Movie Finder</h2>
        </li>

        <li class="nav-right">
          <a href="favourite.html">Favourites</a>
          <div class="icon">
            <img src="./assets/light-mode.png" alt="theme" id="theme-toggle" />
          </div>
        </li>
      </ul>
    </nav>
    <!-- Container -->
    <div class="container">
      <section class="hero-section">
        <h1>
          Find Your Favorite Movies
          <img src="./assets/film-dark.png" alt="film-logo" id="hero" />
        </h1>
        <p>Search millions of movies and discover detailed information.</p>
        <!-- search box -->
        <div class="search-box">
          <input
            type="text"
            id="search-input"
            placeholder="Search for a movie..."
          />
          <button id="search-btn">Search</button>
        </div>
      </section>

      <!-- empty state -->
      <div class="empty-state">
        <h3>Search for a movie</h3>
        <p>Your results will appear here.</p>
      </div>
      <!-- movies section -->
      <section class="movies-section hidden">
        <h2>Search Results</h2>

        <!-- loading section -->
        <div class="loading hidden">
          <div class="spinner"></div>
          <p>Loading movies...</p>
        </div>

        <div class="movies" id="movies-container">
          <!-- Movie Cards -->
        </div>
      </section>
    </div>

    <!-- footer -->
    <footer>
      <p>Powered by OMDb API • Movie Finder</p>
    </footer>
    <script src="./js/navbar.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
